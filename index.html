            --primary: #22c55e;

            --glass-bg: rgba(10, 20, 12, 0.4);
            --glass-border: rgba(34, 197, 94, 0.3);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        /* Mouse Cursor Trail */
        .cursor-trail {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px var(--primary);
            transition: opacity 0.5s, transform 0.5s;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Social Icons */
        .social-container {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 20px;
            z-index: 50;
        }

        .social-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .social-btn:hover {
            transform: translateY(-10px) scale(1.1);
            background: var(--primary);
            color: #000;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.5);
        }

        .social-btn.youtube:hover {
            background: #ff0000;
            border-color: #ff0000;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.5);
            color: #fff;
        }
        
        .social-btn.discord:hover {
            background: #5865F2;
            border-color: #5865F2;
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.5);
            color: #fff;
        }

        /* Background Image with Parallax Support */
        #bg-image {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background-image: url('https://cdn.corenexis.com/files/c/9371584720.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            transition: transform 0.1s ease-out;
            animation: breathe 8s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% { filter: brightness(0.6); }
            100% { filter: brightness(1.1); }
        }

        /* Crazy Beat Drop Effects (6 Unique Types!) */
        .beat-drop-1 #bg-image { animation: drop1 0.6s cubic-bezier(.36,.07,.19,.97) both !important; }
        @keyframes drop1 {
            0% { transform: scale(1.3) rotate(5deg); filter: contrast(200%) brightness(2) hue-rotate(90deg); }
            100% { transform: scale(1) rotate(0deg); filter: contrast(100%) brightness(1) hue-rotate(0deg); }
        }

        .beat-drop-2 #bg-image { animation: drop2 0.5s cubic-bezier(.36,.07,.19,.97) both !important; }
        @keyframes drop2 {
            0%, 100% { filter: invert(0); transform: scale(1); }
            20%, 80% { filter: invert(1) hue-rotate(180deg); transform: scale(1.2) skewX(15deg); }
        }

        .beat-drop-3 #bg-image { animation: drop3 0.7s ease-out both !important; }
        @keyframes drop3 {
            0% { transform: scale(1.5); filter: saturate(400%) blur(15px); }
            100% { transform: scale(1); filter: saturate(100%) blur(0px); }
        }

        .beat-drop-4 #bg-image { animation: drop4 0.5s ease-out both !important; }
        @keyframes drop4 {
            0%, 100% { transform: scale(1); filter: none; }
            50% { transform: scale(1.15) skewY(-10deg); filter: hue-rotate(270deg) contrast(150%); }
        }

        .beat-drop-5 #bg-image { animation: drop5 0.5s cubic-bezier(.36,.07,.19,.97) both !important; }
        @keyframes drop5 {
            0% { transform: scale(0.8) rotate(15deg); filter: grayscale(100%) brightness(3); }
            100% { transform: scale(1) rotate(0deg); filter: grayscale(0%) brightness(1); }
        }

        .beat-drop-6 #bg-image { animation: drop6 0.4s ease-in both !important; }
        @keyframes drop6 {
            0% { transform: scale(1.4); filter: sepia(100%) saturate(300%) hue-rotate(300deg); }
            100% { transform: scale(1); filter: none; }
        }

        .ui-shake { animation: beatShake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes beatShake {
            10%, 90% { transform: translate3d(-10px, 10px, 0) scale(1.02); }
            20%, 80% { transform: translate3d(10px, -10px, 0) scale(1.02); }
            30%, 50%, 70% { transform: translate3d(-15px, 15px, 0) scale(1.02); }
            40%, 60% { transform: translate3d(15px, -15px, 0) scale(1.02); }
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 0;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .ambient-glow {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            filter: blur(100px);
            pointer-events: none;
        }

        /* Intro Screen Upgrades */
        #enter-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #enter-screen::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(34,197,94,0.05) 2px, rgba(34,197,94,0.05) 4px);
            pointer-events: none;
        }

        #enter-screen .glitch-title {
            font-family: 'Anton', sans-serif;
            font-size: 7rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(34,197,94,0.8), 5px 5px 0px rgba(0,0,0,1);
            animation: float 4s ease-in-out infinite;
        }

        #enter-screen .click-text {
            font-size: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary);
            letter-spacing: 5px;
            animation: strobe 1.5s infinite;
        }

        @keyframes strobe {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--primary); }
            50% { opacity: 0.3; text-shadow: none; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        #main-content {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: scale(0.95);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }

        #main-content.visible {
            opacity: 1;
            transform: scale(1);
        }

        .title {
            font-size: 4.5rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateZ(30px);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: 1px;
            text-shadow: 0 5px 10px rgba(0,0,0,0.8);
            transform: translateZ(20px);
        }

        /* 3D Tilt Copy Container */
        .copy-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), 0 0 20px rgba(34, 197, 94, 0.2);
            transition: transform 0.1s ease-out, box-shadow 0.3s ease;
            max-width: 90vw;
            transform: translateZ(50px);
        }

            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9), 0 0 40px rgba(34, 197, 94, 0.5);
            border-color: var(--primary);
        }

        .code-func { color: #60a5fa; }

            color: var(--primary);
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .copy-container:hover .copy-icon {
            background: var(--primary);
            color: #000;
        }

        #lyrics-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
            overflow: hidden;
        }

        .lyric-word {
            position: absolute;
            font-size: 6.5rem;
            text-transform: uppercase;
            color: #fff;
            -webkit-text-stroke: 4px #000;
            text-shadow: 8px 8px 0px rgba(0,0,0,1);
            margin: 0;
            opacity: 0;
            transform: scale(0.1) rotateZ(-30deg);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.5);
            display: none;
            white-space: nowrap;
            letter-spacing: 3px;
            line-height: 1;
        }

        .lyric-word.active {
            opacity: 1;
            display: block;
        }

        .lyric-word.exit {
            opacity: 0;
            transform: scale(1.5) translateY(-50px) rotateZ(20deg) !important;
            display: block;
            transition: all 0.2s ease-out;
        }

        .scattered-emoji {
            position: absolute;
            font-size: 5rem;
            opacity: 0;
            transform: scale(0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.5);
            z-index: 4;
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.8));
        }

        .scattered-emoji.active { opacity: 1; }
        .scattered-emoji.exit { opacity: 0; transform: scale(2) translateY(100px) !important; }

        .splatter {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--primary);
            opacity: 0;
            z-index: 3;
            transform: scale(0);
            box-shadow: 0 0 20px var(--primary);
        }

        .splatter.active { animation: splatterAnim 0.6s ease-out forwards; }

        @keyframes splatterAnim {
            0% { transform: scale(0); opacity: 1; }
            50% { opacity: 0.8; }
            100% { transform: scale(10); opacity: 0; }
        }

        /* End Screen Title */
        #end-screen-title {
            position: absolute;
            font-family: 'Anton', sans-serif;
            font-size: 8rem;
            color: #fff;
            -webkit-text-stroke: 4px #000;
            text-shadow: 10px 10px 0px var(--primary);
            z-index: 9000;
            text-transform: uppercase;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.1) rotate(0deg);
        }

        #end-screen-title.active {
            animation: spinAway 4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes spinAway {
            0% { opacity: 0; transform: scale(0.1) rotate(-180deg); }
            20% { opacity: 1; transform: scale(1.2) rotate(10deg); }
            40% { opacity: 1; transform: scale(1) rotate(0deg); }
            70% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(3) rotate(360deg) translateZ(500px); }
        }

        .notification {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid var(--primary);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            opacity: 0;
            z-index: 1000;
        }
        .notification.show { bottom: 100px; opacity: 1; }
    </style>
</head>

                this.opacity = Math.random() * 0.5 + 0.1;
                this.thickness = Math.random() * 1.5 + 0.5;
            }
            update() {
                this.y += this.speed;
                if (this.y > height) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y + this.length);
                ctx.strokeStyle = `rgba(34, 197, 94, ${this.opacity})`;
                ctx.lineWidth = this.thickness;
                ctx.stroke();
            }
        }
        for (let i = 0; i < 150; i++) particles.push(new Particle());

        function animateRain() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateRain);
        }
        animateRain();
    </script>
</body>
</html>
